name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.7.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  validate-api:
    name: Validate API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.7.1 --activate

      - name: Install API dependencies
        run: pnpm --dir api install --frozen-lockfile

      - name: Test API
        run: pnpm --dir api test

      - name: Build API
        run: pnpm --dir api build

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [validate-frontend, validate-api]
    environment: production
    env:
      RENDER_API_DEPLOY_HOOK_URL_PROD: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL_PROD }}
      RENDER_WEB_DEPLOY_HOOK_URL_PROD: ${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL_PROD }}
      PROD_API_HEALTHCHECK_URL: ${{ secrets.PROD_API_HEALTHCHECK_URL }}
      PROD_WEB_HEALTHCHECK_URL: ${{ secrets.PROD_WEB_HEALTHCHECK_URL }}

    steps:
      - name: Validate required secrets
        run: |
          required_vars=(
            RENDER_API_DEPLOY_HOOK_URL_PROD
            RENDER_WEB_DEPLOY_HOOK_URL_PROD
            PROD_API_HEALTHCHECK_URL
            PROD_WEB_HEALTHCHECK_URL
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required secret: ${var_name}"
              exit 1
            fi
          done

      - name: Trigger Render API deploy
        run: |
          curl -fsS -X POST "${RENDER_API_DEPLOY_HOOK_URL_PROD}" -o /tmp/api-deploy-hook-response.txt
          cat /tmp/api-deploy-hook-response.txt

      - name: Trigger Render web deploy
        run: |
          curl -fsS -X POST "${RENDER_WEB_DEPLOY_HOOK_URL_PROD}" -o /tmp/web-deploy-hook-response.txt
          cat /tmp/web-deploy-hook-response.txt

      - name: Verify production health checks
        run: |
          poll_url() {
            local url="$1"
            local label="$2"
            local max_attempts=40
            local sleep_seconds=15

            for attempt in $(seq 1 "${max_attempts}"); do
              status=$(curl -sS -o /tmp/"${label}".response.txt -w "%{http_code}" "${url}" || true)
              if [ "${status}" = "200" ]; then
                echo "${label} healthy (${url})"
                cat /tmp/"${label}".response.txt
                return 0
              fi
              echo "[${attempt}/${max_attempts}] ${label} not ready yet (HTTP ${status})"
              sleep "${sleep_seconds}"
            done

            echo "${label} health check failed after ${max_attempts} attempts: ${url}"
            return 1
          }

          poll_url "${PROD_API_HEALTHCHECK_URL}" "api"
          poll_url "${PROD_WEB_HEALTHCHECK_URL}" "web"
